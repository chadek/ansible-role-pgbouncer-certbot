---
- name: Reload pgbouncer
  ansible.builtin.systemd:
    name: pgbouncer
    state: reloaded
  when: molecule_yml is not defined

- name: Reload sshd
  ansible.builtin.systemd:
    name: sshd
    state: reloaded
  when: molecule_yml is not defined

- name: Sync cert
  ansible.builtin.command: >-
    /etc/letsencrypt/renewal-hooks/deploy/sync-certificates.sh
  register: sync_output
  changed_when: sync_output.rc != 0
  when: >-
    pgbouncer_share_cert.state | default('') == 'master'
    and molecule_yml is not defined
